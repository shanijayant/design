<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Be My Eyes Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Version nav ── */
    .version-nav {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 999px;
      padding: 4px;
      gap: 2px;
    }

    .version-nav button {
      padding: 8px 22px;
      border-radius: 999px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: rgba(255,255,255,.6);
      background: transparent;
      transition: all .2s;
      white-space: nowrap;
    }

    .version-nav button.active {
      background: #fff;
      color: #111;
    }

    /* ── Panels ── */
    .panel { display: none; min-height: 100vh; flex-direction: column; }
    .panel.active { display: flex; }

    /* ══════════════════════════════════════
       V1 — LIGHT
    ══════════════════════════════════════ */
    .v1 { background: #e8eaf0; }

    .v1-header {
      background: #ffffff;
      border-bottom: 1px solid #e0e0e0;
      padding: 0 28px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: #1A63F5;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg { width: 28px; height: 28px; }

    .logo-text .name {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: #111;
      line-height: 1.2;
    }

    .logo-text .role {
      display: block;
      font-size: 15px;
      font-weight: 700;
      color: #1A63F5;
      line-height: 1.2;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    /* Toggle — shared */
    .toggle {
      width: 52px;
      height: 30px;
      background: #34C759;
      border-radius: 15px;
      position: relative;
      flex-shrink: 0;
      cursor: pointer;
      transition: background .2s;
    }
    .toggle.off { background: #c0c0c0; }
    .toggle::after {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      background: #fff;
      border-radius: 50%;
      top: 3px;
      right: 3px;
      box-shadow: 0 1px 3px rgba(0,0,0,.25);
      transition: right .2s, left .2s;
    }
    .toggle.off::after { right: auto; left: 3px; }

    .agent-info {
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      background: #34C759;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background .2s;
    }

    .v1-agent-name {
      font-size: 16px;
      font-weight: 500;
      color: #111;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .avatar svg { width: 22px; height: 22px; fill: #fff; }

    .v1-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .v1-card {
      background: #ffffff;
      border: 1px solid #d8dae0;
      border-radius: 14px;
      padding: 48px 56px 44px;
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .queue-name {
      font-size: 20px;
      font-weight: 700;
      color: #0a0a0a;
      margin-bottom: 20px;
    }

    .lang-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #ebebeb;
      border-radius: 999px;
      padding: 10px 22px;
      font-size: 16px;
      color: #333;
      margin-bottom: 20px;
    }
    .lang-pill .lang-label { font-weight: 400; }
    .lang-pill .lang-value { font-weight: 700; }

    .timer {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
    }
    .timer-dot {
      width: 10px;
      height: 10px;
      background: #29ABE2;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .timer-value {
      font-size: 17px;
      font-weight: 500;
      color: #333;
      font-variant-numeric: tabular-nums;
    }

    .actions {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 10px;
      border-radius: 999px;
      border: none;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      justify-content: center;
      transition: opacity .15s, transform .1s;
    }
    .btn:hover { opacity: .9; }
    .btn:active { transform: scale(.97); }
    .btn svg { fill: #fff; flex-shrink: 0; }

    /* V1 button sizing */
    .v1 .btn {
      font-size: 17px;
      padding: 16px 40px;
      min-width: 180px;
    }
    .v1 .btn svg { width: 20px; height: 20px; }

    .btn-decline { background: #FF69B4; }
    .btn-answer  { background: #2A7A2A; }


    /* ══════════════════════════════════════
       V2 — DARK
    ══════════════════════════════════════ */
    .v2 { background: #0d0d0d; }

    .v2-header {
      background: #161616;
      border-bottom: 1px solid #2a2a2a;
      padding: 0 32px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .v2-agent-name {
      font-size: 16px;
      font-weight: 500;
      color: #e8e8e8;
    }

    .v2-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #3a3a3a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .v2-avatar svg { width: 22px; height: 22px; fill: #ccc; }

    .v2-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .v2-card {
      background: #1c1c1c;
      border: 1px solid #2e2e2e;
      border-radius: 18px;
      padding: 60px 72px 56px;
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .v2-card .queue-name { color: #f0f0f0; }

    .v2-card .lang-pill {
      background: #2a2a2a;
      color: #ccc;
    }
    .v2-card .lang-pill .lang-value { color: #fff; }

    .v2-card .timer-value { color: #aaa; }

    /* V2 button sizing — larger */
    .v2 .btn {
      font-size: 20px;
      padding: 22px 56px;
      min-width: 220px;
    }
    .v2 .btn svg { width: 24px; height: 24px; }

    .v2-status-dot {
      width: 10px;
      height: 10px;
      background: #34C759;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background .2s;
    }
  </style>
</head>
<body>

  <!-- Version nav -->
  <nav class="version-nav" aria-label="Version switcher">
    <button class="active" onclick="showPanel('v1', this)">Light</button>
    <button onclick="showPanel('v2', this)">Dark</button>
  </nav>

  <!-- BME sun icon (reusable inline) -->
  <template id="bme-icon">
    <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="14" cy="14" r="4.2" fill="white"/>
      <g stroke="white" stroke-width="1.8" stroke-linecap="round">
        <line x1="14" y1="1.5" x2="14" y2="6"/>
        <line x1="14" y1="22" x2="14" y2="26.5"/>
        <line x1="1.5" y1="14" x2="6" y2="14"/>
        <line x1="22" y1="14" x2="26.5" y2="14"/>
        <line x1="5.5"  y1="5.5"  x2="8.7"  y2="8.7"/>
        <line x1="19.3" y1="19.3" x2="22.5" y2="22.5"/>
        <line x1="22.5" y1="5.5"  x2="19.3" y2="8.7"/>
        <line x1="8.7"  y1="19.3" x2="5.5"  y2="22.5"/>
      </g>
    </svg>
  </template>

  <!-- ════════════════ V1 LIGHT ════════════════ -->
  <div class="panel v1 active" id="panel-v1">
    <header class="v1-header">
      <div class="logo">
        <div class="logo-icon" aria-hidden="true">
          <svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="4.2" fill="white"/><g stroke="white" stroke-width="1.8" stroke-linecap="round"><line x1="14" y1="1.5" x2="14" y2="6"/><line x1="14" y1="22" x2="14" y2="26.5"/><line x1="1.5" y1="14" x2="6" y2="14"/><line x1="22" y1="14" x2="26.5" y2="14"/><line x1="5.5" y1="5.5" x2="8.7" y2="8.7"/><line x1="19.3" y1="19.3" x2="22.5" y2="22.5"/><line x1="22.5" y1="5.5" x2="19.3" y2="8.7"/><line x1="8.7" y1="19.3" x2="5.5" y2="22.5"/></g></svg>
        </div>
        <div class="logo-text">
          <span class="name">Be My Eyes</span>
          <span class="role">Agent</span>
        </div>
      </div>
      <div class="nav-right">
        <div class="toggle" id="v1-toggle" role="switch" aria-checked="true" aria-label="Available" tabindex="0"></div>
        <div class="agent-info">
          <div class="status-dot" id="v1-dot"></div>
          <span class="v1-agent-name">Shani</span>
        </div>
        <div class="avatar" aria-label="Profile">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
        </div>
      </div>
    </header>

    <main class="v1-main">
      <div class="v1-card">
        <h1 class="queue-name">Be My Eyes Employees</h1>
        <div class="lang-pill" aria-label="Caller speaks English">
          <span class="lang-label">Caller speaks</span>
          <span class="lang-value">English</span>
        </div>
        <div class="timer" aria-label="00:09 elapsed">
          <div class="timer-dot"></div>
          <span class="timer-value">00:09</span>
        </div>
        <div class="actions">
          <button class="btn btn-decline" aria-label="Decline call">
            <svg viewBox="0 0 24 24"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.12-.56-2.32-.56-3.56 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>
            Decline
          </button>
          <button class="btn btn-answer" aria-label="Answer call">
            <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
            Answer
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- ════════════════ V2 DARK ════════════════ -->
  <div class="panel v2" id="panel-v2">
    <header class="v2-header">
      <div class="logo">
        <div class="logo-icon" aria-hidden="true">
          <svg viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="4.2" fill="white"/><g stroke="white" stroke-width="1.8" stroke-linecap="round"><line x1="14" y1="1.5" x2="14" y2="6"/><line x1="14" y1="22" x2="14" y2="26.5"/><line x1="1.5" y1="14" x2="6" y2="14"/><line x1="22" y1="14" x2="26.5" y2="14"/><line x1="5.5" y1="5.5" x2="8.7" y2="8.7"/><line x1="19.3" y1="19.3" x2="22.5" y2="22.5"/><line x1="22.5" y1="5.5" x2="19.3" y2="8.7"/><line x1="8.7" y1="19.3" x2="5.5" y2="22.5"/></g></svg>
        </div>
        <div class="logo-text">
          <span class="name" style="color:#f0f0f0;">Be My Eyes</span>
          <span class="role">Agent</span>
        </div>
      </div>
      <div class="nav-right">
        <div class="toggle" id="v2-toggle" role="switch" aria-checked="true" aria-label="Available" tabindex="0"></div>
        <div class="agent-info">
          <div class="v2-status-dot" id="v2-dot"></div>
          <span class="v2-agent-name">Shani</span>
        </div>
        <div class="v2-avatar" aria-label="Profile">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
        </div>
      </div>
    </header>

    <main class="v2-main">
      <div class="v2-card">
        <h1 class="queue-name">Be My Eyes Employees</h1>
        <div class="lang-pill" aria-label="Caller speaks English">
          <span class="lang-label">Caller speaks</span>
          <span class="lang-value">English</span>
        </div>
        <div class="timer" aria-label="00:09 elapsed">
          <div class="timer-dot"></div>
          <span class="timer-value">00:09</span>
        </div>
        <div class="actions">
          <button class="btn btn-decline" aria-label="Decline call">
            <svg viewBox="0 0 24 24"><path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.12-.56-2.32-.56-3.56 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>
            Decline
          </button>
          <button class="btn btn-answer" aria-label="Answer call">
            <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
            Answer
          </button>
        </div>
      </div>
    </main>
  </div>

  <script>
    function showPanel(id, btn) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.version-nav button').forEach(b => b.classList.remove('active'));
      document.getElementById('panel-' + id).classList.add('active');
      btn.classList.add('active');
    }

    function wireToggle(toggleId, dotId, dotClass) {
      const toggle = document.getElementById(toggleId);
      const dot = document.getElementById(dotId);
      toggle.addEventListener('click', () => {
        const on = toggle.getAttribute('aria-checked') === 'true';
        toggle.setAttribute('aria-checked', String(!on));
        toggle.classList.toggle('off', on);
        dot.style.background = on ? '#666' : '#34C759';
      });
    }

    wireToggle('v1-toggle', 'v1-dot', 'status-dot');
    wireToggle('v2-toggle', 'v2-dot', 'v2-status-dot');
  </script>
</body>
</html>
